<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lower Third Dual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Left Lower Third -->
  <div id="ltl-container">
    <div id="ltl-inner">
      <div id="ltl-name-group">
        <div id="ltl-name-ghost"></div>
        <div id="ltl-name-box">
          <div id="ltl-name-text">
            <span id="ltl-nombre"></span>
            <span id="ltl-apellido"></span>
          </div>
        </div>
      </div>
      <div id="ltl-title-box">
        <span id="ltl-cargo"></span>
      </div>
    </div>
  </div>

  <!-- Right Lower Third -->
  <div id="ltr-container">
    <div id="ltr-inner">
      <div id="ltr-name-group">
        <div id="ltr-name-ghost"></div>
        <div id="ltr-name-box">
          <div id="ltr-name-text">
            <span id="ltr-nombre"></span>
            <span id="ltr-apellido"></span>
          </div>
        </div>
      </div>
      <div id="ltr-title-box">
        <span id="ltr-cargo"></span>
      </div>
    </div>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
