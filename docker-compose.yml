version: '3.8'

services:
  overlays:
    build: .
    container_name: acn-overlays
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_TOKEN=${AUTH_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    restart: unless-stopped
    volumes:
      - overlays_data:/app/data

volumes:
  overlays_data:
